# Architecture rules
architecture:
  component_pattern: |
    Components are functional React components using hooks. State lives in App.tsx
    and flows down via props. No external state libraries (Redux, Zustand).
  styling: |
    All styling uses inline CSS-in-JS via `const styles: Record<string, React.CSSProperties>`.
    Dark theme: backgrounds #0f0f23 / #1a1a2e, text #ccc/#fff, borders #2a2a3e/#333.
    No CSS files, no Tailwind, no styled-components.
  preload_bridge: |
    Renderer communicates with main process via window.caddee API exposed in preload.
    All sidecar communication goes through: renderer -> preload -> main -> sidecar.
    New IPC methods need changes in 3 files: preload/index.ts, main/ipc-handlers.ts,
    and the CaddeeAPI type.
  three_js: |
    Viewport.tsx owns the Three.js scene. Uses STLLoader for mesh loading, OrbitControls
    for camera interaction. Mesh material color changes for compile status feedback
    (grey=stable, yellow=compiling). Thumbnail capture via canvas toDataURL.

guidelines:
  - "State flows from App.tsx down — components receive data and callbacks via props"
  - "Use inline styles (Record<string, React.CSSProperties>), never CSS files"
  - "Dark theme palette: bg #0f0f23/#1a1a2e, text #ccc/#fff, border #2a2a3e/#333, accent #7c8aff"
  - "All sidecar calls go through window.caddee.sendToSidecar() — never call IPC directly"
  - "New preload methods require updating preload/index.ts AND the CaddeeAPI type"
  - "Use crypto.randomUUID() for request IDs"
  - "Three.js resources (geometries, materials) must be disposed on unmount"
  - "Base64 STL ↔ ArrayBuffer conversion: use atob + Uint8Array pattern from App.tsx"
  - "Components are self-contained — no shared CSS, no external component libraries"
  - "Prefer useCallback for handlers passed to child components"

validation_commands:
  - "cd electron && npx tsc --noEmit"
  - "cd electron && npm run dev"

context_files:
  - "electron/src/renderer/App.tsx"
  - "electron/src/preload/index.ts"
  - "electron/src/main/ipc-handlers.ts"
  - "electron/tsconfig.json"
  - "electron/package.json"
  - "shared/messages.ts"
